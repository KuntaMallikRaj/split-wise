databases:
  - name: split-wise-db
    databaseName: splitwise
    user: splitwise
    plan: free
    ipAllowList: []  # internal-only access

services:
  - type: web
    name: split-wise
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: split-wise-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
