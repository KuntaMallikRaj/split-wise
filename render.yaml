services:
  - type: web
    name: split-wise
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      # Render free tier allows only one Postgres database per account, so this
      # app reuses an existing one. After the first deploy, set DATABASE_URL in
      # the dashboard to your existing DB's Internal Connection String. The
      # tables (users, groups, expenses, ...) don't collide with other apps.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
